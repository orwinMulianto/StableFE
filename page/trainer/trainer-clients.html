<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clients - STABLE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Giga:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/navbar.css" />
    <link rel="stylesheet" href="../../css/trainer-dashboard.css" />
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>

    <nav class="navbar">
      <div class="logo-area">
        <img src="../../Img/logo.png" alt="Logo" class="logo-img" />
        <span class="logo-text">STABLE</span>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Home</a>
        <a href="trainer-clients.html" class="nav-link active">Clients</a>
        <a href="trainer-profile.html" class="nav-link">Profile</a>
      </div>
      <div class="nav-actions">
        <span class="trainer-badge">TRAINER</span>
        <span class="user-greeting" id="userGreeting">Coach</span>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-inner">
        <div class="hero-left">
          <p class="welcome-label">Clients</p>
          <h2>My Clients</h2>
          <p class="welcome-sub">Lihat dan kelola semua klien kamu.</p>
        </div>
        <div class="hero-stats">
          <div class="hero-stat-card">
            <span class="hero-stat-icon">👥</span>
            <div>
              <span class="hero-stat-value" id="totalClientsHero">0</span>
              <span class="hero-stat-label">Total Clients</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <main class="content">
      <div class="card">
        <div class="card-header">
          <h3 class="section-title">All Clients</h3>
          <div class="search-wrap">
            <i data-feather="search"></i>
            <input type="text" id="searchInput" placeholder="Cari klien..." />
          </div>
        </div>
        <div class="clients-full-list" id="clientsFullList">
          <p class="empty-text">Belum ada klien.</p>
        </div>
      </div>
    </main>

    <!-- CHAT MODAL -->
    <div class="edit-modal" id="chatModal">
      <div class="modal-container modal-container--wide">
        <div class="modal-header">
          <h3 id="chatModalTitle">Chat dengan —</h3>
          <button class="modal-close" id="closeChatBtn">&times;</button>
        </div>
        <div class="chat-body" id="chatBody">
          <p class="empty-text">Belum ada pesan.</p>
        </div>
        <div class="chat-input-wrap">
          <input type="text" id="chatInput" placeholder="Ketik pesan..." />
          <button class="btn-send" id="sendChatBtn">
            <i data-feather="send"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="../../js/trainer-clients.js"></script>
    <script>window.addEventListener("load", () => feather.replace());</script>
  </body>
</html>
