<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STABLE - Profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Giga:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/profile.css" />
  </head>
  <body>
    <nav class="navbar" id="mainNavbar">
      <a href="#" class="navbar-logo" id="navbarLogo">
        <img src="" alt="Logo STABLE" id="navbarLogoImage" />
        <i>STABLE</i>
      </a>

      <div id="navbar-menu"></div>
      <div class="nav-actions"></div>
    </nav>

    <main class="profile-page">
      <section class="profile-shell">
        <header class="profile-header">
          <div
            class="profile-avatar"
            id="profileAvatar"
            role="button"
            tabindex="0"
            aria-label="View profile picture"
          >
            <img
              src="../Img/defaultavatar.png"
              alt="Profile"
              id="profileImage"
            />
            <button class="avatar-edit" id="editAvatarBtn" type="button">
              <i data-feather="edit-3"></i>
            </button>
          </div>

          <input
            id="avatarInput"
            type="file"
            accept="image/png,image/jpeg,image/webp"
            hidden
          />

          <div class="profile-info">
            <p class="section-label">MY PROFILE</p>
            <div class="profile-name">
              <h1 id="profileName">Loading...</h1>
              <button class="edit-name-btn" id="editNameBtn" type="button">
                <i data-feather="edit-3"></i>
              </button>
            </div>
            <p class="profile-email" id="profileEmail">-</p>

            <div class="profile-meta">
              <span class="rank-badge rank-newbie" id="rankBadge">NEWBIE</span>
              <span class="save-status" id="profileStatus" role="status"></span>
            </div>
          </div>
        </header>

        <section class="profile-stats" aria-label="Profile stats">
          <article class="stat-item">
            <span class="stat-label">Streak</span>
            <strong class="stat-value">
              <span id="streakValue">0</span> 🔥
            </strong>
            <small>daily challenge</small>
          </article>
          <article class="stat-item">
            <span class="stat-label">Rank</span>
            <strong class="stat-value" id="rankValue">Newbie</strong>
            <small>based on streak</small>
          </article>
          <article class="stat-item">
            <span class="stat-label">Workout</span>
            <strong class="stat-value" id="workoutDaysStat">-</strong>
            <small>days per week</small>
          </article>
        </section>

        <section class="profile-section">
          <div class="section-heading">
            <p class="section-title">Personal Details</p>
            <p>Tap setiap field untuk mengubah data profile.</p>
          </div>

          <div class="profile-details">
            <button class="detail-card" data-field="gender" type="button">
              <span class="detail-label">Gender</span>
              <strong class="detail-value empty" id="genderValue">
                Tap to fill
              </strong>
              <span class="detail-edit"><i data-feather="edit-3"></i></span>
            </button>

            <button class="detail-card" data-field="weight" type="button">
              <span class="detail-label">Weight</span>
              <strong class="detail-value empty" id="weightValue">
                Tap to fill
              </strong>
              <span class="detail-edit"><i data-feather="edit-3"></i></span>
            </button>
            <button class="detail-card" data-field="height" type="button">
              <span class="detail-label">Height</span>
              <strong class="detail-value empty" id="heightValue">
                Tap to fill
              </strong>
              <span class="detail-edit"><i data-feather="edit-3"></i></span>
            </button>

            <button class="detail-card" data-field="fitnessLevel" type="button">
              <span class="detail-label">Fitness Level</span>
              <strong class="detail-value empty" id="fitnessValue">
                Tap to fill
              </strong>
              <span class="detail-edit"><i data-feather="edit-3"></i></span>
            </button>
            <button class="detail-card" data-field="mainGoal" type="button">
              <span class="detail-label">Main Goal</span>
              <strong class="detail-value empty" id="goalValue">
                Tap to fill
              </strong>
              <span class="detail-edit"><i data-feather="edit-3"></i></span>
            </button>

            <button class="detail-card" data-field="workoutDays" type="button">
              <span class="detail-label">Workout Days</span>
              <strong class="detail-value empty" id="workoutDaysValue">
                Tap to fill
              </strong>
              <span class="detail-edit"><i data-feather="edit-3"></i></span>
            </button>
          </div>
        </section>
        <div class="logout-section">
          <button class="btn-logout" id="logoutBtn" type="button">
            Logout
          </button>
        </div>
      </section>
    </main>
    <div class="edit-modal" id="editModal" aria-hidden="true">
      <div class="modal-container" role="dialog" aria-modal="true">
        <div class="modal-header">
          <h2 id="modalTitle">Edit</h2>
          <button class="modal-close" id="closeModalBtn" type="button">
            &times;
          </button>
        </div>

        <div class="modal-body" id="modalContent"></div>

        <div class="modal-footer">
          <button class="btn-cancel" id="cancelModalBtn" type="button">
            Cancel
          </button>
          <button class="btn-save" id="saveModalBtn" type="button">Save</button>
        </div>
      </div>
    </div>
    <div class="image-viewer" id="imageViewer" aria-hidden="true">
      <div class="image-viewer-panel" role="dialog" aria-modal="true">
        <button
          class="image-viewer-close"
          id="closeImageViewerBtn"
          type="button"
          aria-label="Close profile picture preview"
        >
          &times;
        </button>
        <img id="profileImagePreview" src="" alt="Profile preview" />
      </div>
    </div>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/profile.js"></script>
    <script>
      feather.replace();
    </script>
  </body>
</html>
